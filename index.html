<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장별 계약 현황 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1329b082580a4823b7f61332c8e24741&libraries=services&autoload=false"></script>
    <style>
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');font-weight:400;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');font-weight:500;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-SemiBold.woff') format('woff');font-weight:600;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');font-weight:700;}

        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f7f8fa;min-height:100vh;color:#1a1a1a;}

        .login-overlay{position:fixed;inset:0;background:#f7f8fa;z-index:9999;display:flex;align-items:center;justify-content:center;}
        .login-box{background:#fff;padding:48px 40px;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);max-width:380px;width:90%;text-align:center;}
        .login-box h2{font-size:1.25em;font-weight:700;margin-bottom:6px;}
        .login-box p{color:#888;font-size:.85em;margin-bottom:28px;line-height:1.5;}
        .login-input{width:100%;padding:11px 14px;border:1.5px solid #e2e4e8;border-radius:8px;font-size:.95em;font-family:inherit;margin-bottom:14px;transition:border-color .2s;background:#fafbfc;}
        .login-input:focus{outline:none;border-color:#3b82f6;background:#fff;}
        .login-input.error{border-color:#ef4444;animation:shake .3s;}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
        .login-btn{width:100%;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:.95em;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s;}
        .login-btn:hover{background:#333;}
        .login-error{color:#ef4444;font-size:.82em;margin-top:12px;display:none;}
        .hidden{display:none!important;}

        .top-bar{background:#fff;border-bottom:1px solid #eaedf0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
        .top-bar h1{font-size:1.05em;font-weight:700;letter-spacing:-.02em;}
        .top-bar-actions{display:flex;gap:8px;}

        .main-layout{display:grid;grid-template-columns:55fr 45fr;height:calc(100vh - 53px);}

        .left-panel{background:#fff;border-right:1px solid #eaedf0;display:flex;flex-direction:column;overflow:hidden;}
        .summary-bar{padding:16px 20px 12px;border-bottom:1px solid #eaedf0;}
        .summary-top{display:flex;align-items:center;gap:16px;margin-bottom:12px;}
        .summary-stats{display:flex;gap:6px;flex:1;}
        .stat-pill{display:flex;align-items:baseline;gap:4px;padding:6px 12px;border-radius:6px;background:#f7f8fa;}
        .stat-pill .sv{font-size:1.15em;font-weight:700;line-height:1;}
        .stat-pill .sl{font-size:.7em;color:#888;font-weight:500;}
        .sv.c-total{color:#1a1a1a;}.sv.c-done{color:#16a34a;}.sv.c-prog{color:#f59e0b;}.sv.c-rej{color:#ef4444;}

        .progress-row{display:flex;align-items:center;gap:10px;}
        .progress-label{font-size:.75em;color:#888;font-weight:500;white-space:nowrap;}
        .progress-track{flex:1;height:5px;background:#eaedf0;border-radius:3px;overflow:hidden;display:flex;}
        .progress-done{background:#16a34a;height:100%;transition:width .4s;}
        .progress-rej{background:#ef4444;height:100%;transition:width .4s;}
        .progress-pct{font-size:.82em;font-weight:700;min-width:36px;text-align:right;}

        .filter-bar{padding:8px 20px;border-bottom:1px solid #eaedf0;display:flex;gap:6px;flex-wrap:wrap;}
        .filter-chip{padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:500;border:1px solid #e2e4e8;background:#fff;cursor:pointer;transition:all .15s;color:#666;white-space:nowrap;}
        .filter-chip:hover{border-color:#bbb;}
        .filter-chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

        .list-scroll{flex:1;overflow-y:auto;}
        .list-scroll::-webkit-scrollbar{width:4px;}
        .list-scroll::-webkit-scrollbar-thumb{background:#d0d3d8;border-radius:2px;}

        .group-header{padding:6px 20px;background:#f4f5f7;font-size:.72em;font-weight:600;color:#888;letter-spacing:.02em;position:sticky;top:0;z-index:1;border-bottom:1px solid #eaedf0;}

        .site-item{display:grid;grid-template-columns:32px 1fr 72px 120px;align-items:center;gap:4px;padding:9px 20px;border-bottom:1px solid #f0f1f3;cursor:pointer;transition:background .12s;}
        .site-item:hover{background:#f7f8fa;}
        .site-item.active{background:#f0f4ff;}
        .site-seq{font-size:.72em;color:#bbb;text-align:center;}
        .site-name{font-size:.84em;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .site-counts{display:flex;gap:3px;justify-content:flex-end;}
        .site-counts span{font-size:.72em;font-weight:600;padding:1px 5px;border-radius:3px;}
        .cnt-done{color:#16a34a;background:#f0fdf4;}.cnt-prog{color:#d97706;background:#fffbeb;}.cnt-rej{color:#ef4444;background:#fef2f2;}
        .site-progress{display:flex;align-items:center;gap:6px;}
        .site-progress-track{flex:1;height:4px;background:#eaedf0;border-radius:2px;overflow:hidden;display:flex;}
        .site-progress-done{background:#16a34a;height:100%;}.site-progress-rej{background:#ef4444;height:100%;}
        .site-progress-pct{font-size:.75em;font-weight:700;min-width:32px;text-align:right;color:#555;}

        .right-panel{display:flex;flex-direction:column;overflow:hidden;background:#f7f8fa;}
        .detail-header{background:#fff;padding:14px 20px;border-bottom:1px solid #eaedf0;display:flex;align-items:center;justify-content:space-between;}
        .detail-title{font-size:.95em;font-weight:700;}
        .detail-badges{display:flex;gap:10px;}
        .detail-badge{font-size:.78em;display:flex;align-items:baseline;gap:3px;}
        .detail-badge .label{color:#888;}.detail-badge .val{font-weight:700;}
        .detail-badge .val.done{color:#16a34a;}.detail-badge .val.prog{color:#d97706;}.detail-badge .val.rej{color:#ef4444;}

        .detail-content{flex:1;overflow-y:auto;padding:16px 20px;}
        .detail-content::-webkit-scrollbar{width:4px;}
        .detail-content::-webkit-scrollbar-thumb{background:#d0d3d8;border-radius:2px;}

        .map-section{margin-bottom:14px;}
        .map-legend{display:flex;gap:12px;margin-bottom:6px;font-size:.72em;color:#888;}
        .legend-item{display:flex;align-items:center;gap:4px;}
        .legend-dot{width:7px;height:7px;border-radius:50%;}
        .legend-dot.done{background:#16a34a;}.legend-dot.prog{background:#f59e0b;}.legend-dot.rej{background:#ef4444;}.legend-dot.unknown{background:#ccc;}
        .map-container{width:100%;aspect-ratio:1/1;max-height:360px;border-radius:8px;overflow:hidden;border:1px solid #eaedf0;background:#fff;}

        .detail-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);}
        .detail-table th{padding:8px 12px;text-align:left;font-size:.72em;font-weight:600;color:#888;background:#f9fafb;border-bottom:1px solid #eaedf0;white-space:nowrap;}
        .detail-table td{padding:7px 12px;font-size:.82em;border-bottom:1px solid #f0f1f3;vertical-align:top;}
        .detail-table tbody tr:hover{background:#fafbfc;}
        .detail-table .seq{color:#ccc;font-size:.78em;}
        .status-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72em;font-weight:600;}
        .chip-done{background:#f0fdf4;color:#16a34a;}.chip-prog{background:#fffbeb;color:#d97706;}.chip-rej{background:#fef2f2;color:#ef4444;}.chip-unknown{background:#f3f4f6;color:#9ca3af;}

        .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:.9em;}

        .btn{padding:6px 12px;border:1px solid #dde0e4;border-radius:6px;font-size:.78em;font-family:inherit;font-weight:500;cursor:pointer;background:#fff;color:#555;transition:all .15s;display:flex;align-items:center;gap:4px;}
        .btn:hover{background:#f7f8fa;border-color:#c5c8cd;}
        .btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}.btn-dark:hover{background:#333;border-color:#333;}

        .loading{text-align:center;color:#999;font-size:.9em;padding:60px 20px;}

        @media(max-width:1024px){.main-layout{grid-template-columns:1fr;height:auto;}.left-panel{max-height:50vh;}.right-panel{min-height:60vh;}}
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>접근 인증</h2>
            <p>계약 현황 대시보드에 접근하려면<br>비밀번호를 입력하세요.</p>
            <input type="password" id="password-input" class="login-input" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter')checkPassword()">
            <button class="login-btn" onclick="checkPassword()">로그인</button>
            <div id="login-error" class="login-error">비밀번호가 올바르지 않습니다.</div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="top-bar">
            <h1>DL이앤씨 현장별 계약 현황</h1>
            <div class="top-bar-actions">
                <button class="btn" onclick="downloadFullCSV()">CSV 다운로드</button>
                <button class="btn btn-dark" onclick="downloadSummaryExcel()">Excel 다운로드</button>
            </div>
        </div>
        <div id="loading" class="loading">데이터를 불러오는 중...</div>
        <div id="dashboard" style="display:none;">
            <div class="main-layout">
                <div class="left-panel">
                    <div class="summary-bar">
                        <div class="summary-top">
                            <div class="summary-stats">
                                <div class="stat-pill"><span class="sv c-total" id="s-total">0</span><span class="sl">전체</span></div>
                                <div class="stat-pill"><span class="sv c-done" id="s-done">0</span><span class="sl">완료</span></div>
                                <div class="stat-pill"><span class="sv c-prog" id="s-prog">0</span><span class="sl">진행중</span></div>
                                <div class="stat-pill"><span class="sv c-rej" id="s-rej">0</span><span class="sl">거절</span></div>
                            </div>
                        </div>
                        <div class="progress-row">
                            <span class="progress-label">진척율</span>
                            <div class="progress-track"><div class="progress-done" id="p-done"></div><div class="progress-rej" id="p-rej"></div></div>
                            <span class="progress-pct" id="p-pct">0%</span>
                        </div>
                    </div>
                    <div class="filter-bar" id="filter-bar"></div>
                    <div class="list-scroll" id="list-scroll"></div>
                </div>
                <div class="right-panel">
                    <div id="detail-empty" class="empty-state">좌측 현장을 선택하세요</div>
                    <div id="detail-view" style="display:none;">
                        <div class="detail-header">
                            <span class="detail-title" id="d-title"></span>
                            <div class="detail-badges">
                                <div class="detail-badge"><span class="label">전체</span><span class="val" id="d-total"></span></div>
                                <div class="detail-badge"><span class="label">완료</span><span class="val done" id="d-done"></span></div>
                                <div class="detail-badge"><span class="label">진행중</span><span class="val prog" id="d-prog"></span></div>
                                <div class="detail-badge"><span class="label">거절</span><span class="val rej" id="d-rej"></span></div>
                            </div>
                        </div>
                        <div class="detail-content">
                            <div class="map-section">
                                <div class="map-legend">
                                    <div class="legend-item"><div class="legend-dot done"></div><span>계약완료</span></div>
                                    <div class="legend-item"><div class="legend-dot prog"></div><span>진행중</span></div>
                                    <div class="legend-item"><div class="legend-dot rej"></div><span>계약거절</span></div>
                                    <div class="legend-item"><div class="legend-dot unknown"></div><span>미정</span></div>
                                </div>
                                <div id="map" class="map-container"></div>
                            </div>
                            <table class="detail-table">
                                <thead><tr>
                                    <th style="width:36px">#</th>
                                    <th style="min-width:140px">매장명</th>
                                    <th style="min-width:200px">주소</th>
                                    <th style="width:80px">상태</th>
                                </tr></thead>
                                <tbody id="detail-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkPassword(){
            const input=document.getElementById('password-input');
            if(input.value==='qpseltm123!'){
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                sessionStorage.setItem('dashboard_auth','true');loadData();
            }else{
                input.classList.add('error');document.getElementById('login-error').style.display='block';
                setTimeout(()=>input.classList.remove('error'),300);
            }
        }
        window.onload=function(){
            if(sessionStorage.getItem('dashboard_auth')==='true'){
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');loadData();
            }
        };

        const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSzD8fDno66QoWMhKWJj4jTCsoCtiMPOe8SL11BC-1sIgSbEC-a3HFHY8JIUaTSjPEtkP3wHurWv7sh/pub?gid=669865932&single=true&output=csv';
        let rawData=[],siteData={},activeSite=null,activeFilter='전체',categories=[];

        function parseCSV(text){
            const result=[],lines=[];let cur='',inQ=false;
            for(let i=0;i<text.length;i++){const c=text[i];if(c==='"'){inQ=!inQ;cur+=c;}else if((c==='\n'||c==='\r')&&!inQ){if(cur.trim())lines.push(cur);cur='';if(c==='\r'&&text[i+1]==='\n')i++;}else cur+=c;}
            if(cur.trim())lines.push(cur);
            for(let i=1;i<lines.length;i++){
                const v=parseCSVLine(lines[i]);
                // 시트에 "영업요청 작성일자"(v[11]) 컬럼이 추가되면서 뒤 컬럼이 한 칸 밀림 → 인덱스 보정
                const site=clean(v[1]),store=clean(v[7]),category=clean(v[2]),address=clean(v[10]),statusSymbol=clean(v[13]),statusText=clean(v[12]);
                if(!site||!store)continue;
                let status;
                if(statusSymbol==='O')status='계약 완료';
                else if(statusSymbol==='X')status='계약 거절';
                else if(statusSymbol==='△')status='진행 중';
                else{const lt=statusText||'';if(lt.includes('완료'))status='계약 완료';else if(lt.includes('거절')||lt.includes('부재')||lt.includes('폐업'))status='계약 거절';else if(lt.includes('진행')||lt.includes('대기'))status='진행 중';else status='진행 중';}
                result.push({site,store,address,status,category,statusText});
            }
            return result;
        }
        function parseCSVLine(line){const vals=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur='';}else cur+=c;}vals.push(cur);return vals;}
        function clean(t){return(t||'').replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim();}

        function processData(){
            siteData={};const catSet=new Set();
            rawData.forEach(r=>{
                if(!siteData[r.site])siteData[r.site]={total:0,completed:0,progress:0,rejected:0,stores:[],category:r.category};
                const s=siteData[r.site];s.total++;s.stores.push(r);
                if(r.status.includes('완료'))s.completed++;else if(r.status.includes('거절'))s.rejected++;else s.progress++;
                if(r.category)catSet.add(r.category);
            });
            categories=[...catSet].sort((a,b)=>a.localeCompare(b));
        }

        function calcRate(c,r,t){return t===0?0:Math.round(((c+r)/t)*100);}

        function getFilteredSites(){
            return Object.entries(siteData).filter(([,s])=>activeFilter==='전체'||s.category===activeFilter)
                .sort((a,b)=>{const cc=(a[1].category||'').localeCompare(b[1].category||'');return cc!==0?cc:a[0].localeCompare(b[0]);});
        }

        function updateSummary(){
            let tot=0,done=0,prog=0,rej=0;
            getFilteredSites().forEach(([,s])=>{tot+=s.total;done+=s.completed;prog+=s.progress;rej+=s.rejected;});
            document.getElementById('s-total').textContent=tot;document.getElementById('s-done').textContent=done;
            document.getElementById('s-prog').textContent=prog;document.getElementById('s-rej').textContent=rej;
            const rate=calcRate(done,rej,tot);
            document.getElementById('p-pct').textContent=rate+'%';
            document.getElementById('p-done').style.width=(tot>0?(done/tot)*100:0)+'%';
            document.getElementById('p-rej').style.width=(tot>0?(rej/tot)*100:0)+'%';
        }

        function renderFilters(){
            const bar=document.getElementById('filter-bar');bar.innerHTML='';
            const mkChip=(label,val)=>{const c=document.createElement('span');c.className='filter-chip'+(activeFilter===val?' active':'');c.textContent=label;c.onclick=()=>{activeFilter=val;renderFilters();renderList();updateSummary();};bar.appendChild(c);};
            mkChip('전체','전체');
            categories.forEach(cat=>mkChip(cat,cat));
        }

        function renderList(){
            const wrap=document.getElementById('list-scroll');wrap.innerHTML='';
            const sorted=getFilteredSites();let lastCat='',seq=0;
            sorted.forEach(([name,site])=>{
                if(site.category!==lastCat){lastCat=site.category;const gh=document.createElement('div');gh.className='group-header';gh.textContent=site.category||'미분류';wrap.appendChild(gh);}
                seq++;
                const rate=calcRate(site.completed,site.rejected,site.total),dp=site.total>0?(site.completed/site.total)*100:0,rp=site.total>0?(site.rejected/site.total)*100:0;
                const el=document.createElement('div');el.className='site-item';el.dataset.site=name;
                el.innerHTML=`<span class="site-seq">${seq}</span><div class="site-name" title="${name}">${name}</div><div class="site-counts"><span class="cnt-done">${site.completed}</span><span class="cnt-prog">${site.progress}</span><span class="cnt-rej">${site.rejected}</span></div><div class="site-progress"><div class="site-progress-track"><div class="site-progress-done" style="width:${dp}%"></div><div class="site-progress-rej" style="width:${rp}%"></div></div><span class="site-progress-pct">${rate}%</span></div>`;
                el.onclick=()=>selectSite(name,site,el);wrap.appendChild(el);
            });
            if(sorted.length>0){const first=wrap.querySelector('.site-item');selectSite(sorted[0][0],sorted[0][1],first);}
            else{document.getElementById('detail-empty').style.display='flex';document.getElementById('detail-view').style.display='none';}
        }

        function selectSite(name,site,el){
            document.querySelectorAll('.site-item').forEach(e=>e.classList.remove('active'));
            if(el)el.classList.add('active');activeSite=name;
            document.getElementById('detail-empty').style.display='none';
            const dv=document.getElementById('detail-view');dv.style.display='flex';dv.style.flexDirection='column';dv.style.flex='1';dv.style.overflow='hidden';
            document.getElementById('d-title').textContent=name;
            document.getElementById('d-total').textContent=site.total;document.getElementById('d-done').textContent=site.completed;
            document.getElementById('d-prog').textContent=site.progress;document.getElementById('d-rej').textContent=site.rejected;
            const tbody=document.getElementById('detail-tbody');tbody.innerHTML='';
            const sorted=[...site.stores].sort((a,b)=>{const order=s=>{if(s.includes('진행'))return 1;if(s.includes('완료'))return 2;if(s.includes('거절'))return 3;return 0;};return order(a.status)-order(b.status);});
            sorted.forEach((st,idx)=>{const tr=document.createElement('tr');tr.innerHTML=`<td class="seq">${idx+1}</td><td>${st.store}</td><td style="font-size:.78em;color:#666">${st.address}</td><td><span class="status-chip ${chipClass(st.status)}">${st.status}</span></td>`;tbody.appendChild(tr);});
            setTimeout(()=>initMap(sorted),80);
        }

        function chipClass(s){if(s.includes('완료'))return'chip-done';if(s.includes('거절'))return'chip-rej';if(s.includes('진행'))return'chip-prog';return'chip-unknown';}

        let map=null,markers=[],overlays=[],kakaoLoaded=false,currentInfo=null;
        function initMap(stores){
            const mc=document.getElementById('map');
            if(typeof kakao==='undefined'||typeof kakao.maps==='undefined'){mc.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:.82em;">지도를 불러올 수 없습니다</div>';return;}
            const load=()=>{
                markers.forEach(m=>m.setMap(null));overlays.forEach(o=>o.setMap(null));markers=[];overlays=[];if(currentInfo){currentInfo.setMap(null);currentInfo=null;}
                map=new kakao.maps.Map(mc,{center:new kakao.maps.LatLng(37.5665,126.978),level:5});
                map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
                const geo=new kakao.maps.services.Geocoder(),bounds=new kakao.maps.LatLngBounds();let valid=0;
                stores.forEach(st=>{if(!st.address)return;
                    geo.addressSearch(st.address,(res,status)=>{
                        if(status!==kakao.maps.services.Status.OK)return;
                        const coords=new kakao.maps.LatLng(res[0].y,res[0].x),color=markerColor(st.status);
                        const div=document.createElement('div');div.innerHTML=`<div style="width:12px;height:12px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer;transition:transform .12s" onmouseover="this.style.transform='scale(1.3)'" onmouseout="this.style.transform='scale(1)'"></div>`;
                        const ov=new kakao.maps.CustomOverlay({position:coords,content:div,yAnchor:.5,xAnchor:.5});ov.setMap(map);overlays.push(ov);
                        const info=new kakao.maps.CustomOverlay({position:coords,content:`<div style="background:#fff;padding:6px 10px;border-radius:5px;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.15);border-left:3px solid ${color};font-family:Pretendard,sans-serif"><div style="font-weight:600;margin-bottom:1px">${st.store}</div><div style="color:#888;font-size:10px">${st.status}</div></div>`,yAnchor:1.6,xAnchor:.5});
                        div.onclick=()=>{if(currentInfo)currentInfo.setMap(null);if(currentInfo===info){currentInfo=null;}else{info.setMap(map);currentInfo=info;}};
                        bounds.extend(coords);valid++;if(valid>0)map.setBounds(bounds,60,30,60,30);
                    });
                });
                kakao.maps.event.addListener(map,'click',()=>{if(currentInfo){currentInfo.setMap(null);currentInfo=null;}});
            };
            if(!kakaoLoaded)kakao.maps.load(()=>{kakaoLoaded=true;load();});else load();
        }
        function markerColor(s){if(s.includes('완료'))return'#16a34a';if(s.includes('거절'))return'#ef4444';if(s.includes('진행'))return'#f59e0b';return'#ccc';}

        function downloadFullCSV(){
            let csv='상위본부,현장,매장명,주소,상태\n';
            [...rawData].sort((a,b)=>{const cc=(siteData[a.site]?.category||'').localeCompare(siteData[b.site]?.category||'');if(cc!==0)return cc;const sc=a.site.localeCompare(b.site);if(sc!==0)return sc;const o=s=>{if(s.includes('진행'))return 1;if(s.includes('완료'))return 2;return 3;};return o(a.status)-o(b.status);}).forEach(r=>{csv+=`"${siteData[r.site]?.category||''}","${r.site}","${r.store}","${r.address}","${r.status}"\n`;});
            const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`계약현황_전체_${dateStr()}.csv`;a.click();
        }

        function downloadSummaryExcel(){
            const wb=XLSX.utils.book_new(),sd=[['현장별 계약 현황 요약'],[''],['#','상위본부','현장명','전체','완료','진행중','거절','진척율']];
            const sorted=Object.entries(siteData).sort((a,b)=>{const cc=(a[1].category||'').localeCompare(b[1].category||'');return cc!==0?cc:a[0].localeCompare(b[0]);});
            let tots={t:0,c:0,p:0,r:0};
            sorted.forEach(([n,s],i)=>{sd.push([i+1,s.category,n,s.total,s.completed,s.progress,s.rejected,calcRate(s.completed,s.rejected,s.total)/100]);tots.t+=s.total;tots.c+=s.completed;tots.p+=s.progress;tots.r+=s.rejected;});
            sd.push(['','','합계',tots.t,tots.c,tots.p,tots.r,calcRate(tots.c,tots.r,tots.t)/100]);
            const ws=XLSX.utils.aoa_to_sheet(sd);ws['!cols']=[{wch:5},{wch:14},{wch:35},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12}];
            for(let i=3;i<sd.length;i++){const c=XLSX.utils.encode_cell({r:i,c:7});if(ws[c])ws[c].z='0%';}
            XLSX.utils.book_append_sheet(wb,ws,'요약');
            sorted.forEach(([n,s])=>{const d=[[`${n} 상세`],[`전체:${s.total} | 완료:${s.completed} | 진행중:${s.progress} | 거절:${s.rejected} | 진척율:${calcRate(s.completed,s.rejected,s.total)}%`],[''],['#','매장명','주소','상태']];s.stores.forEach((st,i)=>d.push([i+1,st.store,st.address,st.status]));const sw=XLSX.utils.aoa_to_sheet(d);sw['!cols']=[{wch:6},{wch:30},{wch:50},{wch:12}];XLSX.utils.book_append_sheet(wb,sw,n.replace(/[\\\/\*\?\[\]:]/g,'_').substring(0,31));});
            XLSX.writeFile(wb,`계약현황_${dateStr()}.xlsx`);
        }

        function dateStr(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}

        async function loadData(){
            try{const res=await fetch(CSV_URL);const text=await res.text();rawData=parseCSV(text);processData();renderFilters();updateSummary();renderList();document.getElementById('loading').style.display='none';document.getElementById('dashboard').style.display='block';}
            catch(e){document.getElementById('loading').textContent='데이터 로드 실패: '+e.message;}
        }
    </script>
